name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write
  id-token: write # Required for PyPI OIDC Trusted Publishing

jobs:
  release:
    name: Create Release & Build Packages
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build

      - name: Build CLI Package
        run: |
          cd cli
          python -m build

      - name: Create GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            cli/dist/*.whl
            cli/dist/*.tar.gz
          draft: false
          prerelease: false
          generate_release_notes: true

      - name: Downcase repository name for Docker
        run: |
          echo "REPO_LC=$(echo ${GITHUB_REPOSITORY} | tr '[A-Z]' '[a-z]')" >> ${GITHUB_ENV}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Frontend Docker image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          build-args: |
            NEXT_PUBLIC_API_URL=/api/v1
            BACKEND_API_URL=http://api:8000
          tags: |
            ghcr.io/${{ env.REPO_LC }}/frontend:latest
            ghcr.io/${{ env.REPO_LC }}/frontend:${{ github.ref_name }}

      - name: Build and push Backend Docker image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ env.REPO_LC }}/backend:latest
            ghcr.io/${{ env.REPO_LC }}/backend:${{ github.ref_name }}

      - name: Publish CLI package to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: cli/dist/

  build-windows-exe:
    name: Build Standalone Windows Executable & GUI Installer
    runs-on: windows-latest
    needs: release
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller build
          pip install -e cli/

      - name: Compile Executable
        run: |
          cd cli
          pyinstaller --onefile --name envforage envforage/__main__.py

      - name: Compile Windows Installer (Inno Setup)
        uses: Minionguyjpro/Inno-Setup-Action@v1.2.2
        with:
          path: cli/installer/setup.iss

      - name: Upload Installer to GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            cli/dist/envforage.exe
            cli/installer/Output/envforage-v*-setup.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
