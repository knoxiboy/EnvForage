apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "envforge.fullname" . }}-ollama
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ include "envforge.fullname" . }}-ollama
  template:
    metadata:
      labels:
        app: {{ include "envforge.fullname" . }}-ollama
    spec:
      containers:
        - name: ollama
          image: {{ .Values.ollama.image }}
          ports:
            - containerPort: 11434
          volumeMounts:
            - name: ollama-data
              mountPath: /root/.ollama
      volumes:
        - name: ollama-data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "envforge.fullname" . }}-ollama
spec:
  selector:
    app: {{ include "envforge.fullname" . }}-ollama
  ports:
    - port: 11434
      targetPort: 11434
