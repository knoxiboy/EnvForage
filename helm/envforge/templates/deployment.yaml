apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "envforge.fullname" . }}-backend
  labels:
    app: {{ include "envforge.fullname" . }}-backend
spec:
  selector:
    matchLabels:
      app: {{ include "envforge.fullname" . }}-backend
  template:
    metadata:
      labels:
        app: {{ include "envforge.fullname" . }}-backend
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      initContainers:
        - name: migrate
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - sh
            - -c
            - |
              alembic upgrade head &&
              python -m app.services.seed_service
          envFrom:
            - configMapRef:
                name: {{ include "envforge.fullname" . }}-config
      containers:
        - name: envforge
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: {{ include "envforge.fullname" . }}-config
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
