{{- if .Values.networkPolicy.enabled }}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "envforage.fullname" . }}-default-deny-ingress
  labels:
    app: {{ include "envforage.fullname" . }}
spec:
  podSelector: {}
  policyTypes:
    - Ingress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "envforage.fullname" . }}-default-deny-egress
  labels:
    app: {{ include "envforage.fullname" . }}
spec:
  podSelector: {}
  policyTypes:
    - Egress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "envforage.fullname" . }}-frontend
  labels:
    app: {{ include "envforage.fullname" . }}-frontend
spec:
  podSelector:
    matchLabels:
      app: {{ include "envforage.fullname" . }}-frontend
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - ports:
        - port: 3000
          protocol: TCP
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: {{ include "envforage.fullname" . }}-backend
      ports:
        - port: 8000
          protocol: TCP
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.networkPolicy.dnsNamespace }}
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "envforage.fullname" . }}-backend
  labels:
    app: {{ include "envforage.fullname" . }}-backend
spec:
  podSelector:
    matchLabels:
      app: {{ include "envforage.fullname" . }}-backend
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: {{ include "envforage.fullname" . }}-frontend
      ports:
        - port: 8000
          protocol: TCP
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: {{ include "envforage.fullname" . }}-postgres
      ports:
        - port: 5432
          protocol: TCP
    - to:
        - podSelector:
            matchLabels:
              app: {{ include "envforage.fullname" . }}-redis
      ports:
        - port: 6379
          protocol: TCP
    - to:
        - podSelector:
            matchLabels:
              app: {{ include "envforage.fullname" . }}-ollama
      ports:
        - port: 11434
          protocol: TCP
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.networkPolicy.dnsNamespace }}
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "envforage.fullname" . }}-postgres
  labels:
    app: {{ include "envforage.fullname" . }}-postgres
spec:
  podSelector:
    matchLabels:
      app: {{ include "envforage.fullname" . }}-postgres
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: {{ include "envforage.fullname" . }}-backend
      ports:
        - port: 5432
          protocol: TCP
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.networkPolicy.dnsNamespace }}
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "envforage.fullname" . }}-redis
  labels:
    app: {{ include "envforage.fullname" . }}-redis
spec:
  podSelector:
    matchLabels:
      app: {{ include "envforage.fullname" . }}-redis
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: {{ include "envforage.fullname" . }}-backend
      ports:
        - port: 6379
          protocol: TCP
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.networkPolicy.dnsNamespace }}
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "envforage.fullname" . }}-ollama
  labels:
    app: {{ include "envforage.fullname" . }}-ollama
spec:
  podSelector:
    matchLabels:
      app: {{ include "envforage.fullname" . }}-ollama
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: {{ include "envforage.fullname" . }}-backend
      ports:
        - port: 11434
          protocol: TCP
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.networkPolicy.dnsNamespace }}
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
{{- end }}
