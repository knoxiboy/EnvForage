repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.13
    hooks:
      - id: ruff
        args: [--fix]
        files: ^backend/
        types_or: [python, pyi]
        exclude: ^backend/alembic/
  - repo: https://github.com/psf/black-pre-commit-mirror
    rev: 26.5.1
    hooks:
      - id: black
        args: [--fast, --quiet]
        files: ^backend/
        types_or: [python, pyi]
        exclude: ^backend/alembic/
