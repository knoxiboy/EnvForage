
# --- Full Local Docker Stack ---
version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: envforage-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-envforage_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-devpassword123}
      POSTGRES_DB: ${POSTGRES_DB:-envforage_dev}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      # Mount initialization scripts if any
      # - ./backend/scripts/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-envforage_admin} -d ${POSTGRES_DB:-envforage_dev}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - envforage-network

  redis:
    image: redis:7-alpine
    container_name: envforage-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-devredis123}
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD-SHELL", "REDISCLI_AUTH=${REDIS_PASSWORD:-devredis123} redis-cli ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - envforage-network

  pgadmin:
    image: dpage/pgadmin4
    container_name: envforage-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@envforage.local}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin123}
    ports:
      - "5050:80"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - pgadmindata:/var/lib/pgadmin
    networks:
      - envforage-network

  migrate:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: envforage-migrate-local
    restart: "no"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-envforage_admin}:${POSTGRES_PASSWORD:-devpassword123}@db:5432/${POSTGRES_DB:-envforage_dev}
      REDIS_URL: redis://:${REDIS_PASSWORD:-devredis123}@redis:6379/0
      ENVIRONMENT: development
      DEBUG: "true"
      SECRET_KEY: dev-secret-key-change-in-production
    command: alembic upgrade head
    networks:
      - envforage-network

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: envforage-api-local
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-envforage_admin}:${POSTGRES_PASSWORD:-devpassword123}@db:5432/${POSTGRES_DB:-envforage_dev}
      REDIS_URL: redis://:${REDIS_PASSWORD:-devredis123}@redis:6379/0
      ENVIRONMENT: development
      DEBUG: "true"
      SECRET_KEY: dev-secret-key-change-in-production
      ALLOWED_ORIGINS: http://localhost:3000,http://127.0.0.1:3000
      ENVFORAGE_LLM_PROVIDER: mock
    volumes:
      - ./backend:/app
    command: >
      sh -c "
        python -m app.services.seed_service &&
        uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
      "
    networks:
      - envforage-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=http://localhost:8000/api/v1
        - BACKEND_API_URL=http://api:8000
    container_name: envforage-frontend-local
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
    depends_on:
      - api
    networks:
      - envforage-network

volumes:
  pgdata:
  redisdata:
  pgadmindata:

networks:
  envforage-network:
    driver: bridge
